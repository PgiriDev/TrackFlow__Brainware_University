<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.52" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15182f"/>
      <stop offset="1" stop-color="#232447"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a3a"/>
      <stop offset="1" stop-color="#07122a"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#667eea" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .float {
        animation: float 4.6s ease-in-out infinite;
        transform-origin: center;
      }
      .sheetUp {
        animation: sheetUp 4.6s ease-in-out infinite;
      }
      .hoverPulse {
        animation: hoverPulse 1.6s ease-in-out infinite;
        transform-origin: center;
      }
      .tapRing {
        animation: tapRing 2.2s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes sheetUp {
        0%, 10% { transform: translateY(24px); opacity: 0; }
        22%, 82% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(24px); opacity: 0; }
      }
      @keyframes hoverPulse {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.16); }
      }
      @keyframes tapRing {
        0% { opacity: 0; transform: scale(0.6); }
        35% { opacity: 0.8; }
        100% { opacity: 0; transform: scale(1.35); }
      }
    </style>
  </defs>

  <rect width="1200" height="680" rx="22" fill="url(#bg)"/>

  <g opacity="0.32">
    <circle cx="170" cy="120" r="130" fill="#667eea"/>
    <circle cx="1045" cy="560" r="170" fill="#764ba2"/>
  </g>

  <g class="float" filter="url(#softShadow)">
    <rect x="398" y="66" width="404" height="548" rx="48" fill="#0a0f25" stroke="#7381f5" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="417" y="88" width="366" height="504" rx="36" fill="url(#screen)"/>

    <rect x="548" y="76" width="104" height="7" rx="3.5" fill="#1d2547"/>

    <rect x="448" y="126" width="198" height="18" rx="7" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="448" y="154" width="290" height="10" rx="5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="448" y="172" width="236" height="10" rx="5" fill="#ffffff" fill-opacity="0.12"/>

    <rect x="448" y="210" width="106" height="34" rx="11" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="564" y="210" width="138" height="34" rx="11" fill="url(#button)" opacity="0.9"/>
    <text x="608" y="232" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Subscribe</text>
  </g>

  <g class="sheetUp" filter="url(#glow)">
    <rect x="450" y="356" width="516" height="214" rx="22" fill="url(#sheet)" stroke="#7c8af9" stroke-opacity="0.28"/>
    <text x="482" y="398" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Install TrackFlow App</text>
    <text x="482" y="432" fill="#d1d5db" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Get app-like experience from your home screen.</text>

    <rect x="482" y="462" width="452" height="64" rx="14" fill="url(#button)" class="hoverPulse"/>
    <text x="650" y="504" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Install App</text>

    <circle cx="944" cy="388" r="14" fill="#121c3f"/>
    <path d="M939 383L949 393M949 383L939 393" stroke="#dbe4ff" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <circle cx="708" cy="494" r="20" fill="#ffffff" opacity="0.18" class="tapRing"/>
  <circle cx="708" cy="494" r="8" fill="#ffffff" opacity="0.7"/>

  <text x="82" y="635" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">PWA install prompt preview matching TrackFlow landing theme</text>
</svg>
