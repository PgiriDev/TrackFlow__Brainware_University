<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .fade {
        animation: fadeInOut 3.8s ease-in-out infinite;
        transform-origin: center;
      }
      .pulse {
        animation: pulse 2s ease-in-out infinite;
        transform-origin: center;
      }
      .slide {
        animation: slideUp 3.8s ease-in-out infinite;
      }
      @keyframes fadeInOut {
        0%, 12% { opacity: 0; }
        20%, 72% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes slideUp {
        0%, 10% { transform: translateY(20px); opacity: 0; }
        20%, 72% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(20px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="680" rx="22" fill="url(#bg)"/>

  <g opacity="0.22">
    <circle cx="180" cy="120" r="120" fill="#10B981"/>
    <circle cx="1060" cy="580" r="160" fill="#6366F1"/>
  </g>

  <rect x="80" y="70" width="1040" height="540" rx="18" fill="#0B1220" stroke="#334155"/>
  <rect x="80" y="70" width="1040" height="52" rx="18" fill="#111827"/>
  <circle cx="112" cy="96" r="7" fill="#EF4444"/>
  <circle cx="136" cy="96" r="7" fill="#F59E0B"/>
  <circle cx="160" cy="96" r="7" fill="#10B981"/>
  <rect x="210" y="84" width="580" height="24" rx="8" fill="#1F2937"/>

  <rect x="130" y="160" width="520" height="18" rx="6" fill="#334155"/>
  <rect x="130" y="192" width="460" height="12" rx="6" fill="#1F2937"/>
  <rect x="130" y="222" width="340" height="12" rx="6" fill="#1F2937"/>

  <rect x="130" y="270" width="250" height="40" rx="10" fill="#334155"/>
  <rect x="390" y="270" width="160" height="40" rx="10" fill="#10B981"/>

  <g class="slide" filter="url(#shadow)">
    <rect x="560" y="330" width="520" height="220" rx="22" fill="url(#card)" stroke="#334155"/>
    <text x="600" y="382" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">Install TrackFlow App</text>
    <text x="600" y="418" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="24">Add TrackFlow to your home screen</text>

    <rect x="600" y="450" width="440" height="58" rx="14" fill="#14B8A6" class="pulse"/>
    <text x="745" y="488" fill="#052E2B" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Install App</text>

    <circle cx="1038" cy="362" r="16" fill="#1F2937"/>
    <path d="M1032 356L1044 368M1044 356L1032 368" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g class="fade">
    <text x="120" y="590" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">PWA install prompt preview</text>
  </g>
</svg>
